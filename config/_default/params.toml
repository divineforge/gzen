# ── GrowZen Blowfish params ──────────────────────────────
# Full reference: https://blowfish.page/docs/configuration/

# ── Appearance ─────────────────────────────────────────
colorScheme          = "gzen"         # Our custom warm palette
defaultAppearance    = "light"        # Always warm cream — no dark mode
autoSwitchAppearance = false

# ── Header / Footer ────────────────────────────────────
[header]
  layout = "basic"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = false
  showScrollToTop = true

# ── Homepage ───────────────────────────────────────────
[homepage]
  layout     = "custom"    # Uses layouts/partials/home/custom.html
  showRecent = false

# ── Article defaults ───────────────────────────────────
[article]
  showDate            = true
  showDateUpdated     = false
  showAuthor          = false      # Wisdom is from the tradition, not a person
  showAuthorBottom    = false
  showReadingTime     = false
  showWordCount       = false
  showTableOfContents = false
  showBreadcrumbs     = false
  showPagination      = true
  showSummary         = true
  showTaxonomies      = true
  showViews           = false
  showLikes           = false
  showZenMode         = false

[list]
  showSummary = true
  showCards = false
  groupByYear = false

[taxonomy]
  showTermCount = true

[term]
  showTableOfContents = false
  groupByYear = false

# ── Features ───────────────────────────────────────────
enableSearch   = false
enableCodeCopy = false
showLikes      = false
showViews      = false

# ── Content sections ───────────────────────────────────
mainSections = ["principles", "koans", "practice", "engineering", "library"]
