baseURL = "https://gzen.io/"
title = "GrowZen"
theme = "blowfish"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
summaryLength = 70

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "monokai"
    noClasses = false

[outputs]
  home    = ["HTML", "JSON"]   # JSON needed for Blowfish search
  section = ["HTML"]
  taxonomy = ["HTML"]
  term    = ["HTML"]

[taxonomies]
  tag      = "tags"
  category = "categories"

[languages]
  [languages.zh]
    label        = "中文"
    weight       = 1
    title        = "GrowZen · 善聚慧生"
    contentDir   = "content/zh"
    [languages.zh.params]
      subtitle    = "善聚慧生"
      description = "GrowZen 禅生定，定生慧 — 聚集世间善念，以佛陀智慧广泽众生。跟随农历月相，如莲花般在日常生活中觉醒。"

  [languages.en]
    label        = "English"
    weight       = 2
    title        = "GrowZen · 善聚慧生"
    contentDir   = "content/en"
    [languages.en.params]
      subtitle    = "Where Goodness Gathers, Wisdom Grows"
      description = "GrowZen — collecting goodness from around the world and multiplying it through Buddha's teachings."

  [languages.ja]
    label        = "日本語"
    weight       = 3
    title        = "GrowZen · 善集慧生"
    contentDir   = "content/ja"
    [languages.ja.params]
      subtitle    = "善集慧生"
      description = "GrowZen — 世界中の善を集め、仏陀の教えで広げる。太陰暦に従って仏教の教えを更新。"

[params]
  # These are read by our custom partials, not by Blowfish directly
  brand          = "GrowZen"
  brandSubtitle  = "聚善"
  brandTagline   = "禅生定，定生慧"
  lotusEmoji     = "🪷"
