baseURL = "https://gzen.io/"
title = "GrowZen"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
summaryLength = 70

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "monokai"
    noClasses = false

[outputs]
  home = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.zh]
    languageName = "中文"
    weight = 1
    title = "GrowZen · 善聚慧生"
    contentDir = "content/zh"
    [languages.zh.params]
      subtitle = "善聚慧生"
      tagline = "伴随月圆月缺，智慧如莲绽放"
      description = "GrowZen 禅生定，定生慧 — 聚集世间善念，以佛陀智慧广泽众生。跟随农历月相，如莲花般在日常生活中觉醒。"
      rtl = false
  [languages.en]
    languageName = "English"
    weight = 2
    title = "GrowZen · 善聚慧生"
    contentDir = "content/en"
    [languages.en.params]
      subtitle = "Where Goodness Gathers, Wisdom Grows"
      tagline = "Where Meditation Blooms into Wisdom"
      description = "GrowZen — collecting goodness from around the world and multiplying it through Buddha's teachings. Buddhist wisdom following lunar cycles. New insights on even lunar days, blooming like the lotus."
      rtl = false
  [languages.ja]
    languageName = "日本語"
    weight = 3
    title = "GrowZen · 善集慧生"
    contentDir = "content/ja"
    [languages.ja.params]
      subtitle = "善集慧生"
      tagline = "月の満ち欠けとともに、智慧は蓮のように開く"
      description = "GrowZen — 世界中の善を集め、仏陀の教えで広げる。太陰暦に従って仏教の教えを更新。"
      rtl = false

[params]
  author = "GrowZen"
  favicon = "/favicon.svg"
  brand = "GrowZen"
  brandSubtitle = "聚善"
  brandTagline = "禅生定，定生慧"
  lotusEmoji = "🪷"
  ecosystemLearn = "https://learn.gzen.io"
  ecosystemInvest = "https://invest.gzen.io"
  ecosystemArchitect = "https://architect.gzen.io"
