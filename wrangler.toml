name = "gzen"
pages_build_output_dir = "public"

# Cloudflare Pages does not support [build] or [build.environment] in wrangler.toml.
# Configure the build command and environment variables in the Cloudflare Pages dashboard:
#
#   Build command:  npm ci && hugo mod download && npm run build:css && hugo --minify
#   Output dir:     public
#
# Required environment variables (set in Pages → Settings → Environment variables):
#   HUGO_VERSION = 0.128.0
#   NODE_VERSION = 20
#   GO_VERSION   = 1.22
